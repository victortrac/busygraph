<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusyGraph Quick Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            color-scheme: light;
            --bg: #eff2f7;
            --bg-strong: #e6ebf3;
            --panel: #f8fafc;
            --panel-strong: #ffffff;
            --border: #d6dde8;
            --text: #121923;
            --muted: #566477;
            --subtle: #7e8ba0;
            --shadow: 0 18px 42px rgba(15, 23, 36, 0.08);
            --accent-keyboard: #356fe4;
            --accent-keyboard-fill: rgba(53, 111, 228, 0.16);
            --gridline: rgba(93, 108, 130, 0.18);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                color-scheme: dark;
                --bg: #0f141b;
                --bg-strong: #131a23;
                --panel: #171f2a;
                --panel-strong: #1b2430;
                --border: #2b3746;
                --text: #edf2fa;
                --muted: #a9b4c6;
                --subtle: #7c899f;
                --shadow: 0 22px 48px rgba(0, 0, 0, 0.34);
                --accent-keyboard: #81a9ff;
                --accent-keyboard-fill: rgba(129, 169, 255, 0.18);
                --gridline: rgba(255, 255, 255, 0.09);
            }
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: "Avenir Next", "Segoe UI Variable", "SF Pro Text", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.42), transparent 30%),
                linear-gradient(180deg, var(--bg), var(--bg-strong));
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .mini-shell {
            min-height: 100vh;
            padding: 16px;
            display: flex;
        }

        .mini-panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
            border-radius: 22px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.72);
            box-shadow: var(--shadow);
            padding: 18px;
        }

        @media (prefers-color-scheme: dark) {
            .mini-panel {
                background: rgba(27, 36, 48, 0.92);
            }
        }

        .mini-header,
        .mini-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
        }

        .mini-title {
            margin: 0;
            color: var(--subtle);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        h1 {
            margin: 6px 0 0;
            font-size: 1.35rem;
            line-height: 1;
            letter-spacing: -0.03em;
        }

        .mini-meta {
            flex-direction: column;
            align-items: flex-end;
        }

        .mini-meta-label {
            color: var(--subtle);
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .mini-meta-value {
            color: var(--muted);
            font-size: 0.75rem;
        }

        .mini-hero {
            display: grid;
            gap: 6px;
            padding: 16px 18px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: var(--panel);
        }

        .mini-hero-label {
            color: var(--subtle);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .current-kpm {
            color: var(--text);
            font-size: clamp(2.6rem, 10vw, 3.5rem);
            font-weight: 700;
            letter-spacing: -0.05em;
            line-height: 0.94;
        }

        .mini-hero-caption {
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .chart-card {
            border-radius: 18px;
            border: 1px solid var(--border);
            background: var(--panel);
            padding: 14px;
        }

        .chart-title {
            margin: 0 0 10px;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .chart-wrapper {
            position: relative;
            height: 210px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .stat-item {
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--panel);
            padding: 12px;
        }

        .stat-label {
            margin: 0 0 8px;
            color: var(--subtle);
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .stat-value {
            color: var(--text);
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .mini-footer {
            color: var(--muted);
            font-size: 0.78rem;
            line-height: 1.5;
        }

        @media (max-width: 420px) {
            .mini-shell {
                padding: 12px;
            }

            .mini-panel {
                padding: 16px;
            }

            .mini-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .mini-meta {
                align-items: flex-start;
            }

            .stats-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body data-theme="system">
    <div class="mini-shell">
        <section class="mini-panel">
            <header class="mini-header">
                <div>
                    <p class="mini-title">BusyGraph</p>
                    <h1>Quick Stats</h1>
                </div>
                <div class="mini-meta">
                    <span class="mini-meta-label">Live</span>
                    <span class="mini-meta-value" id="lastUpdate">Loading...</span>
                </div>
            </header>

            <section class="mini-hero">
                <div class="mini-hero-label">Current KPM</div>
                <div class="current-kpm" id="currentKPM">0</div>
                <div class="mini-hero-caption">Recent typing pace over the rolling one-hour window.</div>
            </section>

            <section class="chart-card">
                <p class="chart-title">Last 30 Minutes</p>
                <div class="chart-wrapper">
                    <canvas id="miniChart"></canvas>
                </div>
            </section>

            <section class="stats-row">
                <article class="stat-item">
                    <p class="stat-label">Total Keys</p>
                    <div class="stat-value" id="totalKeys">0</div>
                </article>
                <article class="stat-item">
                    <p class="stat-label">Peak KPM</p>
                    <div class="stat-value" id="maxKPM">0</div>
                </article>
                <article class="stat-item">
                    <p class="stat-label">Average KPM</p>
                    <div class="stat-value" id="avgKPM">0</div>
                </article>
            </section>

            <div class="mini-footer">A compact instrument view aligned with the full BusyGraph dashboard.</div>
        </section>
    </div>

    <script>
        function themePalette() {
            const css = getComputedStyle(document.documentElement);
            return {
                panelStrong: css.getPropertyValue('--panel-strong').trim(),
                border: css.getPropertyValue('--border').trim(),
                text: css.getPropertyValue('--text').trim(),
                muted: css.getPropertyValue('--muted').trim(),
                subtle: css.getPropertyValue('--subtle').trim(),
                grid: css.getPropertyValue('--gridline').trim(),
                keyboard: css.getPropertyValue('--accent-keyboard').trim(),
                keyboardFill: css.getPropertyValue('--accent-keyboard-fill').trim(),
            };
        }

        function chartPlugins() {
            const palette = themePalette();
            return {
                legend: { display: false },
                tooltip: {
                    backgroundColor: palette.panelStrong,
                    titleColor: palette.text,
                    bodyColor: palette.muted,
                    borderColor: palette.border,
                    borderWidth: 1,
                    displayColors: false,
                    padding: 10,
                },
            };
        }

        function chartScales() {
            const palette = themePalette();
            return {
                x: {
                    ticks: {
                        color: palette.subtle,
                        maxTicksLimit: 6,
                        font: { size: 9 }
                    },
                    grid: { color: palette.grid },
                    border: { color: palette.grid },
                },
                y: {
                    beginAtZero: true,
                    ticks: {
                        color: palette.subtle,
                        font: { size: 9 }
                    },
                    grid: { color: palette.grid },
                    border: { color: palette.grid },
                }
            };
        }

        const ctx = document.getElementById('miniChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'KPM',
                    data: [],
                    borderColor: themePalette().keyboard,
                    backgroundColor: themePalette().keyboardFill,
                    fill: true,
                    tension: 0.28,
                    borderWidth: 2,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    pointBackgroundColor: themePalette().keyboard,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: chartPlugins(),
                scales: chartScales(),
            }
        });

        function applyChartTheme() {
            const palette = themePalette();
            chart.data.datasets[0].borderColor = palette.keyboard;
            chart.data.datasets[0].backgroundColor = palette.keyboardFill;
            chart.data.datasets[0].pointBackgroundColor = palette.keyboard;
            chart.options.plugins = chartPlugins();
            chart.options.scales = chartScales();
            chart.update('none');
        }

        async function fetchStats() {
            try {
                const response = await fetch('/api/stats?range=1h');
                const data = await response.json();

                let currentKPM = 0;
                if (data.history && data.history.length > 0) {
                    for (let i = data.history.length - 1; i >= 0; i--) {
                        if (data.history[i].count > 0) {
                            currentKPM = data.history[i].count;
                            break;
                        }
                    }
                }

                document.getElementById('currentKPM').textContent = currentKPM;
                document.getElementById('totalKeys').textContent = data.total.toLocaleString();
                document.getElementById('maxKPM').textContent = data.kpm.max.toLocaleString();
                document.getElementById('avgKPM').textContent = data.kpm.avg.toFixed(1);

                const last30 = data.history.slice(-30);
                chart.data.labels = last30.map(point => {
                    const date = new Date(point.time * 1000);
                    return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                });
                chart.data.datasets[0].data = last30.map(point => point.count);
                chart.update('none');

                document.getElementById('lastUpdate').textContent =
                    new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            } catch (error) {
                console.error('Error fetching stats:', error);
                document.getElementById('lastUpdate').textContent = 'Update failed';
            }
        }

        const colorSchemeQuery = window.matchMedia('(prefers-color-scheme: dark)');
        if (typeof colorSchemeQuery.addEventListener === 'function') {
            colorSchemeQuery.addEventListener('change', applyChartTheme);
        } else if (typeof colorSchemeQuery.addListener === 'function') {
            colorSchemeQuery.addListener(applyChartTheme);
        }

        fetchStats();
        setInterval(fetchStats, 5000);
    </script>
</body>

</html>
